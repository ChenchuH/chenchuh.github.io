<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chenchu{% endblock %}</title>

    <script>
        (function () {
            const saved = localStorage.getItem("theme");
            const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

            if (saved === "dark" || (!saved && systemDark)) {
                document.documentElement.classList.add("dark-mode");
            }
        })();
    </script>

    <script type="module">
        import "https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.23/+esm";
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/theme-toggles@4.10.1/css/classic.min.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <div class="nav-left">
                <a
                    href="{{ url_for('home') }}"
                    class="{% if request.endpoint == 'home' %}active{% endif %}"
                >
                    Home
                </a>
                <a
                    href="{{ url_for('projects') }}"
                    class="{% if request.endpoint == 'projects' %}active{% endif %}"
                >
                    Projects
                </a>
            </div>

            <div class="nav-right">
                <button
                    id="theme-toggle"
                    class="theme-toggle theme-toggle--force-motion"
                    type="button"
                    title="Toggle theme"
                    aria-label="Toggle theme"
                    aria-live="polite"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" width="1.2em" height="1.2em" fill="currentColor" stroke-linecap="round" class="theme-toggle__classic" viewBox="0 0 32 32">
                        <clipPath id="theme-toggle__classic__cutout">
                            <path d="M0-5h30a1 1 0 0 0 9 13v24H0Z" />
                        </clipPath>
                        <g clip-path="url(#theme-toggle__classic__cutout)">
                            <circle cx="16" cy="16" r="9.34" />
                            <g stroke="currentColor" stroke-width="1.5">
                                <path d="M16 5.5v-4" />
                                <path d="M16 30.5v-4" />
                                <path d="M1.5 16h4" />
                                <path d="M26.5 16h4" />
                                <path d="m23.4 8.6 2.8-2.8" />
                                <path d="m5.7 26.3 2.9-2.9" />
                                <path d="m5.8 5.8 2.8 2.8" />
                                <path d="m23.4 23.4 2.9 2.9" />
                            </g>
                        </g>
                    </svg>
                </button>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="content">
            {% block page_header %}
                {% block page_title %}{% endblock %}
                {% block page_subtitle %}{% endblock %}
            {% endblock %}

            {% block content %}
                <h1 class="center-text-temp">Work In Progress</h1>
            {% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="footer-navbar">
            <span class="footer-copy">© {{ year }} Chenchu · MIT code only</span>

            <div class="footer-links">
                <a href="https://github.com/ChenchuH" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                    <img class="icon-light" src="{{ url_for('static', filename='images/GitHub_Invertocat_Black.png') }}" alt="GitHub">
                    <img class="icon-dark" src="{{ url_for('static', filename='images/GitHub_Invertocat_White.png') }}" alt="GitHub">
                </a>

                <a href="https://www.linkedin.com/in/chenchuhys/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                    <img class="icon-light" src="{{ url_for('static', filename='images/InBug-Black.png') }}" alt="LinkedIn">
                    <img class="icon-dark" src="{{ url_for('static', filename='images/InBug-White.png') }}" alt="LinkedIn">
                </a>

                <a href="mailto:ynchenchuh@icloud.com" aria-label="Email">
                    <img class="icon-light" src="{{ url_for('static', filename='images/mail-32-light-mode.png') }}" alt="Email">
                    <img class="icon-dark" src="{{ url_for('static', filename='images/mail-32.png') }}" alt="Email">
                </a>
            </div>
        </div>
    </footer>

    <script>
        function setupTheme() {
            const root = document.documentElement;
            const button = document.getElementById("theme-toggle");
            if (!button) return;

            function apply(isDark) {
                root.classList.toggle("dark-mode", isDark);
                button.classList.toggle("theme-toggle--toggled", isDark);
            }

            const saved = localStorage.getItem("theme");

            if (saved === "dark" || saved === "light") {
                apply(saved === "dark");
            } else {
                const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                apply(systemDark);
            }

            button.onclick = () => {
                const isDark = !root.classList.contains("dark-mode");
                apply(isDark);
                localStorage.setItem("theme", isDark ? "dark" : "light");
            };

            window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", e => {
                if (!localStorage.getItem("theme")) {
                    apply(e.matches);
                }
            });
        }

        function setupPageTransitions() {
            const container = document.querySelector(".container");
            if (!container) return;

            container.classList.add("is-entering");

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    container.classList.remove("is-entering");
                });
            });
        }

        document.addEventListener("DOMContentLoaded", setupTheme);
        document.addEventListener("turbo:load", setupTheme);

        document.addEventListener("DOMContentLoaded", setupPageTransitions);
        document.addEventListener("turbo:load", setupPageTransitions);

        document.addEventListener("turbo:before-visit", () => {
            const container = document.querySelector(".container");
            if (container) {
                container.classList.add("is-leaving");
            }
        });
    </script>
</body>
</html>
